apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: jiitek-app
  namespace: flux-system
spec:
  image: jobinaj/jiitek-project
  interval: 1m
  # secretRef:                 # only needed if the Docker Hub repo is PRIVATE
  #   name: dockerhub-creds
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: jiitek-app
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: jiitek-app
  filterTags:
    pattern: '^main-(?P<ts>[0-9]+)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc          # highest timestamp = newest
---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: jiitek-app
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: 'auto: update jiitek-app image to {{range .Updated.Images}}{{println .}}{{end}}'
    push:
      branch: main
  update:
    path: ./clusters/argocd-flux/apps
    strategy: Setters
